# Image-based production deploy (Option A — manual pull). Pulls prebuilt images
# from GHCR instead of building from source, so the server needs ONLY this file
# and a .env — no source checkout, no build toolchain. See DEPLOY.md for the
# full runbook.
#
#   docker compose -f docker-compose.deploy.yml pull
#   docker compose -f docker-compose.deploy.yml up -d
#
# Pin the image set with IMAGE_TAG (defaults to `latest` = HEAD of main per the
# CI publish rules); set IMAGE_TAG=sha-<short> or a vX.Y.Z tag to pin a release.
#
# Hardening vs the dev stack (Codex audit Theme 1):
#   * db / redis / backend publish NO host ports — internal compose network only.
#   * ONLY the frontend (nginx) publishes a port (:80).
#   * pgAdmin is intentionally not shipped here.
# Next hardening step (out of scope here): TLS / 443 behind a real reverse proxy.

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pickem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pickem}
      POSTGRES_DB: ${POSTGRES_DB:-pickem}
    # No host port — reachable only on the internal compose network.
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pickem}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - backend_net

  redis:
    image: redis:7-alpine
    # No host port — internal network only.
    # Auth (T8): requirepass is threaded to backend/worker/bot via the
    # authenticated REDIS_URL (redis://:${REDIS_PASSWORD}@redis:6379/0) in .env —
    # confirmed one whole setting in config.py, no code change. The `:?` makes
    # `docker compose` fail-closed (refuse to parse) if REDIS_PASSWORD is unset.
    command:
      ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}"]
    volumes:
      - redisdata:/data
    # GOTCHA: with requirepass on, a plain `redis-cli ping` returns NOAUTH and the
    # healthcheck fails → backend/worker (which gate on redis service_healthy) never
    # start. The healthcheck MUST carry -a $REDIS_PASSWORD to authenticate.
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - backend_net

  # Init container: the shell-free `app.bootstrap` entrypoint runs alembic
  # upgrade head + the three seeds in order (fail-fast), then exits. backend/
  # worker/bot wait for it to complete. The demo seed self-gates on IS_DEMO_DATA
  # (no-ops in prod) and the admin seed self-gates on DEFAULT_ADMIN_* — so this
  # entrypoint is safe verbatim on the prod path.
  migrate:
    image: ghcr.io/zachmce/nfl-pickem-backend:${IMAGE_TAG:-latest}
    command: ["python", "-m", "app.bootstrap"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - backend_net

  backend:
    image: ghcr.io/zachmce/nfl-pickem-backend:${IMAGE_TAG:-latest}
    # Production uvicorn (no --reload, no source mount).
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file: .env
    # No host port — the frontend nginx proxies /api to backend:8000 internally.
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    # backend bridges BOTH networks: frontend_net so nginx can proxy /api to
    # backend:8000, backend_net so it can reach db/redis on the data plane.
    networks:
      - frontend_net
      - backend_net

  worker:
    image: ghcr.io/zachmce/nfl-pickem-backend:${IMAGE_TAG:-latest}
    # Plain celery worker with embedded beat (no watchmedo — that's dev-only).
    # NOTE: embedded --beat is fine for a single worker; if you ever scale workers,
    # split beat into its own singleton service so only one scheduler runs.
    command:
      ["celery", "-A", "app.celery_app.celery_app", "worker", "--beat", "--loglevel=info", "--schedule=/var/lib/celerybeat/celerybeat-schedule"]
    env_file: .env
    # Persist beat's schedule across restarts so it doesn't re-fire on restart.
    volumes:
      - celerybeat:/var/lib/celerybeat
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    networks:
      - backend_net

  # Discord bot (shares the backend image; runs the gateway client). It FAILS FAST
  # and exits if DISCORD_BOT_TOKEN / DISCORD_GUILD_ID are unset — with
  # restart: unless-stopped that becomes a crash-loop, so set them in .env, or
  # remove this service if you are not running the bot.
  bot:
    image: ghcr.io/zachmce/nfl-pickem-backend:${IMAGE_TAG:-latest}
    command: ["python", "-m", "app.bot.client"]
    env_file: .env
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python3", "-c", "import os, time, sys; s=os.stat('/tmp/bot_heartbeat'); sys.exit(0 if time.time()-s.st_mtime < 60 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - backend_net

  frontend:
    image: ghcr.io/zachmce/nfl-pickem-frontend:${IMAGE_TAG:-latest}
    # The ONLY host-published port. Rootless nginx (nginx-unprivileged) serves the
    # compiled SPA on container port 8080 and proxies /api/* to backend:8000 on the
    # internal network. Front this with TLS/443 + a reverse proxy as the next
    # hardening step (Codex audit Theme 1).
    ports:
      - "80:8080"
    depends_on:
      - backend
    restart: unless-stopped
    # frontend joins ONLY frontend_net — it reaches backend:8000 to proxy /api but
    # has NO route to db/redis (defense-in-depth; see the networks block below).
    networks:
      - frontend_net

# Network segmentation (T8, defense-in-depth). nginx (frontend) is the only
# host-exposed service; it must not share a network with the data plane. Two
# bridges: frontend_net (nginx <-> backend for /api) and backend_net (backend/
# worker/bot/migrate <-> db/redis). Only backend joins both, so a hypothetical
# frontend compromise has no route to postgres:5432 / redis:6379.
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
  celerybeat:
