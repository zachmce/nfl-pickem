version: 2
updates:
  # MUST-HAVE: keeps the workflow SHA pins fresh. Dependabot rewrites the pinned
  # commit SHA and updates the trailing `# vX.Y.Z` comment.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    # Supply-chain defense-in-depth: hold new releases for 5 days before opening
    # a bump PR, so a malicious or broken release has time to be yanked/flagged
    # (e.g. by osv-scanner's MAL- advisories) before we pull it. Applied to the
    # third-party PACKAGE ecosystems only, NOT the docker base images below —
    # those are pinned for CVE freshness and a cooldown would delay security
    # patches.
    cooldown:
      default-days: 5
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Backend Python deps (pyproject) — the pip ecosystem covers it.
  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: weekly
    cooldown:
      default-days: 5
    groups:
      pip-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Frontend npm deps.
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    cooldown:
      default-days: 5
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Base container images (Dockerfile FROM lines). Keeps the pinned base-image
  # digests fresh so a digest pin can't silently go stale — as nginx:1.27-alpine
  # did until the Trivy gate caught it. No update-types filter so pure digest
  # refreshes (same tag, new build) are grouped too, not just semver bumps.
  #
  # NOTE (backend cgr.dev base): /backend now pins two `cgr.dev/chainguard/python`
  # FROM lines as `:latest@sha256:...` and `:latest-dev@sha256:...`. This ecosystem
  # already covers them (no per-image config needed), BUT Dependabot reliably
  # bumping a `cgr.dev` `:latest@sha256` DIGEST is less battle-tested than semver
  # tags on Docker Hub / GHCR — `:latest`-only digest bumping on a third-party
  # registry has historically been rougher. If the first weekly docker PR no-ops
  # the cgr.dev digest, the fallback is Renovate (handles cgr.dev `:latest` digest
  # pinning well) or a manual weekly digest bump. Confirm empirically on the first
  # PR; do not over-engineer before then.
  - package-ecosystem: docker
    directory: "/backend"
    schedule:
      interval: weekly
    groups:
      docker-images:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: "/frontend"
    schedule:
      interval: weekly
    groups:
      docker-images:
        patterns: ["*"]

  # ClusterFuzzLite fuzz-build env (not shipped): keep the digest-pinned OSS-Fuzz
  # base image fresh so the Pinned-Dependencies pin can't silently go stale.
  - package-ecosystem: docker
    directory: "/.clusterfuzzlite"
    schedule:
      interval: weekly
    groups:
      docker-images:
        patterns: ["*"]

  # NOTE: no `pip` ecosystem for /.clusterfuzzlite. requirements.txt is a fully
  # hash-pinned, transitive-locked set (uv pip compile --generate-hashes) for
  # `pip --require-hashes`; Dependabot bumps individual `==` lines independently,
  # which breaks coherence (e.g. bumping pydantic-core without pydantic →
  # ResolutionImpossible, PR #28) and isn't caught by PR CI (the fuzz build runs
  # weekly, not on PRs). Regenerate the whole set manually instead (see the header
  # comment in .clusterfuzzlite/requirements.txt). Freshness is immaterial here —
  # it's a throwaway import-only build env, and Scorecard only needs it PINNED.
