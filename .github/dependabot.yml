version: 2
updates:
  # MUST-HAVE: keeps the workflow SHA pins fresh. Dependabot rewrites the pinned
  # commit SHA and updates the trailing `# vX.Y.Z` comment.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Backend Python deps (pyproject) — the pip ecosystem covers it.
  - package-ecosystem: pip
    directory: "/backend"
    schedule:
      interval: weekly
    groups:
      pip-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Frontend npm deps.
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Base container images (Dockerfile FROM lines). Keeps the pinned base-image
  # digests fresh so a digest pin can't silently go stale — as nginx:1.27-alpine
  # did until the Trivy gate caught it. No update-types filter so pure digest
  # refreshes (same tag, new build) are grouped too, not just semver bumps.
  - package-ecosystem: docker
    directory: "/backend"
    schedule:
      interval: weekly
    groups:
      docker-images:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: "/frontend"
    schedule:
      interval: weekly
    groups:
      docker-images:
        patterns: ["*"]

  # ClusterFuzzLite fuzz-build env (not shipped): keep the digest-pinned OSS-Fuzz
  # base image + the hash-pinned import-deps fresh so the Pinned-Dependencies pins
  # can't silently go stale.
  - package-ecosystem: docker
    directory: "/.clusterfuzzlite"
    schedule:
      interval: weekly
    groups:
      docker-images:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: "/.clusterfuzzlite"
    schedule:
      interval: weekly
    groups:
      fuzz-build-deps:
        patterns: ["*"]
