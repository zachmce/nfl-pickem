name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

# Least-privilege default; the publish job widens to packages:write job-scoped.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Install Python 3.14
        run: uv python install 3.14
      - name: Install ruff (dev group)
        working-directory: backend
        run: uv sync --group dev
      - name: ruff check
        working-directory: backend
        run: uv run ruff check .
      - name: ruff format --check
        working-directory: backend
        run: uv run ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: smoke
          POSTGRES_PASSWORD: smoke
          POSTGRES_DB: smoke
        ports:
          - 5432:5432
        # The service health gate IS the wait-for-ready — the runner blocks
        # until postgres is healthy before starting the job steps. No sleep.
        options: >-
          --health-cmd "pg_isready -U smoke"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Install Python 3.14
        run: uv python install 3.14
      - name: Install backend into a uv venv (project + deps)
        # NOT `uv pip install --system` — ubuntu-latest's /usr interpreter is
        # externally managed (PEP 668), which that rejects. `uv sync` builds an
        # isolated .venv; steps below run through `uv run`. Mirrors the lint job.
        working-directory: backend
        run: uv sync --group dev
      - name: Offline unittest suite (SQLite, no services)
        # TEST_DATABASE_URL is intentionally UNSET here so the PG smoke test
        # SKIPS and the suite stays fully offline.
        working-directory: backend
        run: uv run python -m unittest
      - name: PG/Alembic migration smoke (postgres:17-alpine service)
        working-directory: backend
        env:
          # Exact shape the test expects: it parses POSTGRES_* out of this and
          # strips the +psycopg suffix for psycopg.connect.
          TEST_DATABASE_URL: postgresql+psycopg://smoke:smoke@localhost:5432/smoke
        run: uv run python -m unittest tests.test_pg_migration_smoke -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci
      - name: Build (tsc -b && vite build)
        working-directory: frontend
        run: npm run build

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      # gitleaks exits non-zero on a finding, which fails the job — that block
      # IS the gate. We deliberately do NOT upload SARIF to code scanning (that
      # would force security-events: write); top-level contents:read suffices.
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: [lint, test, frontend, secrets]
    # Never on pull_request: only push to main or a v* tag.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: backend
            context: ./backend
            file: ./backend/Dockerfile
            name: ghcr.io/zachmce/nfl-pickem-backend
          - image: frontend
            context: ./frontend
            file: ./frontend/Dockerfile
            name: ghcr.io/zachmce/nfl-pickem-frontend
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ matrix.name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
