name: CI

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']

# Least-privilege default; the publish job widens to packages:write job-scoped.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Path-filter detect job. Emits boolean outputs consumed by the job-level `if:`
  # gates below so a change only runs the jobs it actually affects. We use
  # dorny/paths-filter (NOT workflow-level paths:/paths-ignore:) because gating at
  # the workflow level breaks required-status-checks on protected main — see the
  # ci-complete aggregation gate at the bottom of this file. The `ci` filter forces
  # EVERY gated job to run when the workflow itself changes (a CI edit validates
  # itself). Top-level `contents: read` + the checkout below is sufficient for the
  # git-diff comparison (pull_request diffs the base, push diffs `before`).
  changes:
    runs-on: ubuntu-latest
    outputs:
      # On a v* tag push, paths-filter has no diff base and reports every path
      # unchanged, which skips lint/test/frontend/image-scan and cascades to skip
      # `publish` (it `needs` them) — so a release tag would build no images and
      # release.yml then fails "not found". Force every path true on a tag so the
      # full pipeline runs and gates the release. PRs/branch pushes are unaffected.
      backend: ${{ steps.f.outputs.backend == 'true' || startsWith(github.ref, 'refs/tags/v') }}
      frontend: ${{ steps.f.outputs.frontend == 'true' || startsWith(github.ref, 'refs/tags/v') }}
      docker: ${{ steps.f.outputs.docker == 'true' || startsWith(github.ref, 'refs/tags/v') }}
      ci: ${{ steps.f.outputs.ci == 'true' || startsWith(github.ref, 'refs/tags/v') }}
      # Dedicated filter for the semgrep job. Kept SEPARATE from `ci` on purpose:
      # `ci` forces every gated job to rerun on any workflow edit, but a change to a
      # semgrep RULE (.semgrep/**) must rerun semgrep WITHOUT rerunning lint/test/
      # frontend/iac. Same tag-forcing as the others so a release runs semgrep too.
      semgrep: ${{ steps.f.outputs.semgrep == 'true' || startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # artipacked: paths-filter diffs via the API token, not the stored git credential
      - id: f
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            docker:
              - '**/Dockerfile*'
              - 'docker-compose*.yml'
            ci:
              - '.github/workflows/**'
            # Watches the hand-authored ruleset so a rule edit re-runs semgrep only
            # (see the `semgrep` output above and the semgrep job's path-gated `if:`).
            semgrep:
              - '.semgrep/**'

  lint:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # artipacked: no downstream step needs the stored git token
      # cache-poisoning suppressed: ci.yml runs on a release trigger (push tags v*), but this uv
      # cache is NOT consumed by the publish job (it builds images from source with its own
      # buildx cache), so a poisoned uv cache cannot reach a published artifact; dropping the
      # cache would slow every CI run. Low-confidence finding; documented accept (mirrors the
      # pip-audit --ignore-vuln allowlist posture).
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.2.0  # zizmor: ignore[cache-poisoning]
      - name: Install Python 3.14
        run: uv python install 3.14
      - name: Verify uv.lock is in sync with pyproject.toml
        # Fails if the committed lock would change when re-resolved (e.g. a dep
        # moved between [project.dependencies] and [dependency-groups]). Prevents
        # lock/manifest drift from reaching main. Fix locally with `uv lock`.
        working-directory: backend
        run: uv lock --check
      - name: Install ruff (dev group)
        working-directory: backend
        run: uv sync --group dev
      - name: ruff check
        working-directory: backend
        run: uv run ruff check .
      - name: ruff format --check
        working-directory: backend
        run: uv run ruff format --check .

  typecheck:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # artipacked: no downstream step needs the stored git token
      # cache-poisoning suppressed: ci.yml runs on a release trigger (push tags v*), but this uv
      # cache is NOT consumed by the publish job (it builds images from source with its own
      # buildx cache), so a poisoned uv cache cannot reach a published artifact; dropping the
      # cache would slow every CI run. Low-confidence finding; documented accept (mirrors the
      # pip-audit --ignore-vuln allowlist posture).
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.2.0  # zizmor: ignore[cache-poisoning]
      - name: Install Python 3.14
        run: uv python install 3.14
      - name: Install basedpyright (dev group)
        working-directory: backend
        run: uv sync --group dev
      # BLOCKING baseline-and-ratchet type gate. basedpyright reads the committed
      # backend/.basedpyright/baseline.json and exits non-zero ONLY on NEW errors
      # introduced beyond the baseline — pre-existing (baselined) errors are absorbed.
      # Fixing a baselined error prunes it via a deliberate `--writebaseline` commit
      # that shows up in the diff; the ratchet only ever moves DOWN. A non-zero exit
      # fails the job, matching the ruff and npm audit gates' posture.
      - name: basedpyright (type check)
        working-directory: backend
        run: uv run basedpyright

  deps-audit:
    # Backend dependency-vulnerability gate — the Python counterpart to the frontend's
    # `npm audit --audit-level=high`. Its own job (mirrors the "typecheck is its own job"
    # convention): gives an attributable failure separate from ruff and runs in parallel.
    # This is a read-only audit, so the top-level `contents: read` is sufficient — no
    # job-level permissions are added.
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # artipacked: no downstream step needs the stored git token
      # cache-poisoning suppressed: ci.yml runs on a release trigger (push tags v*), but this uv
      # cache is NOT consumed by the publish job (it builds images from source with its own
      # buildx cache), so a poisoned uv cache cannot reach a published artifact; dropping the
      # cache would slow every CI run. Low-confidence finding; documented accept (mirrors the
      # pip-audit --ignore-vuln allowlist posture).
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.2.0  # zizmor: ignore[cache-poisoning]
      - name: Install Python 3.14
        run: uv python install 3.14
      - name: Install pip-audit (dev group)
        working-directory: backend
        run: uv sync --group dev
      # BLOCKING dependency-vuln gate. Audits the FULL locked tree (runtime + dev): we
      # `uv export` the resolved pin set and feed it to pip-audit, so the EXACT versions in
      # uv.lock are audited with no re-resolution. Full tree (NO --no-dev) for parity with the
      # frontend's full-tree `npm audit`. Flag rationale: --no-emit-project keeps this project
      # itself out of the requirements stream; --no-hashes avoids pip-audit's require-hashes
      # friction while still auditing the pinned versions. pip-audit exits non-zero on ANY
      # advisory (PyPA has no severity threshold) — that non-zero IS the gate, matching the
      # ruff / npm audit / basedpyright posture.
      #
      # NOTE: pip-audit 2.10.x does not accept requirements on stdin (`-r -`), so we export to
      # a temp file and audit that; under the runner's default `bash -eo pipefail`, a failed
      # export fails the step immediately and pip-audit's exit code is the gate.
      #
      # Unfixable / not-applicable advisory ALLOWLIST: append `--ignore-vuln <ID>` to the
      # pip-audit line below, one per advisory, EACH with a `# rationale:` comment (the ID and
      # why it is safe — no fix released / not reachable in our usage). As of this commit the
      # audit is CLEAN, so the allowlist is EMPTY. Escape hatch: if a fix-less advisory ever
      # wedges CI, add a rationale-commented --ignore-vuln here — do NOT silence the whole
      # step, and NEVER allowlist a FIXABLE advisory (bump the dependency instead).
      - name: pip-audit (backend dependency vulnerabilities — BLOCKING)
        working-directory: backend
        run: |
          uv export --format requirements-txt --no-emit-project --no-hashes -o "$RUNNER_TEMP/requirements-audit.txt"
          # Append `--ignore-vuln <ID>  # rationale: ...` per unfixable advisory (empty today — clean).
          uv run pip-audit -r "$RUNNER_TEMP/requirements-audit.txt"
      # Advisory-only pilot of uv's native audit (preview in uv 0.11–0.12; local uv is 0.11.12).
      # Non-blocking (`|| true`) — run purely to compare noise/coverage against pip-audit. To be
      # promoted to replace pip-audit once `uv audit` leaves preview (ci-hardening-plan decision 4).
      - name: uv audit (preview pilot — advisory, non-blocking)
        working-directory: backend
        run: uv audit || true

  test:
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: smoke
          POSTGRES_PASSWORD: smoke
          POSTGRES_DB: smoke
        ports:
          - 5432:5432
        # The service health gate IS the wait-for-ready — the runner blocks
        # until postgres is healthy before starting the job steps. No sleep.
        options: >-
          --health-cmd "pg_isready -U smoke"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # artipacked: no downstream step needs the stored git token
      # cache-poisoning suppressed: ci.yml runs on a release trigger (push tags v*), but this uv
      # cache is NOT consumed by the publish job (it builds images from source with its own
      # buildx cache), so a poisoned uv cache cannot reach a published artifact; dropping the
      # cache would slow every CI run. Low-confidence finding; documented accept (mirrors the
      # pip-audit --ignore-vuln allowlist posture).
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.2.0  # zizmor: ignore[cache-poisoning]
      - name: Install Python 3.14
        run: uv python install 3.14
      - name: Install backend into a uv venv (project + deps)
        # NOT `uv pip install --system` — ubuntu-latest's /usr interpreter is
        # externally managed (PEP 668), which that rejects. `uv sync` builds an
        # isolated .venv; steps below run through `uv run`. Mirrors the lint job.
        working-directory: backend
        run: uv sync --group dev
      - name: Offline unittest suite (SQLite, no services)
        # TEST_DATABASE_URL is intentionally UNSET here so the PG smoke test
        # SKIPS and the suite stays fully offline.
        working-directory: backend
        run: uv run python -m unittest
      - name: PG/Alembic migration smoke (postgres:17-alpine service)
        working-directory: backend
        env:
          # Exact shape the test expects: it parses POSTGRES_* out of this and
          # strips the +psycopg suffix for psycopg.connect.
          TEST_DATABASE_URL: postgresql+psycopg://smoke:smoke@localhost:5432/smoke
        run: uv run python -m unittest tests.test_pg_migration_smoke -v

  frontend:
    needs: [changes]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # artipacked: no downstream step needs the stored git token
      # cache-poisoning suppressed: same rationale as the uv jobs — the npm cache is NOT consumed
      # by the publish job, so a poisoned cache cannot reach a published artifact; low-confidence
      # finding, documented accept.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0  # zizmor: ignore[cache-poisoning]
        with:
          node-version: '26'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: npm ci
        working-directory: frontend
        run: npm ci
      - name: Build (tsc -b && vite build)
        working-directory: frontend
        run: npm run build
      # npm audit at the high+ threshold — BLOCKING (npm audit exits non-zero on a
      # high/critical advisory, which fails the job). Full audit (NO --omit=dev): the
      # frontend is a build-time SPA whose devDependencies (vite, plugins) ARE the
      # trusted build toolchain, so a build-chain advisory is in-scope. Threshold
      # rationale: moderate/low npm audit is dominated by transitive dev-only advisories
      # that are usually unexploitable in a build-only SPA; high+ is the actionable
      # signal. Placed AFTER the build step so a build/typecheck failure isn't masked by
      # an audit failure. Escape hatch if a fix-less high advisory ever wedges CI: bump
      # the level or triage the specific advisory — do NOT silence this step.
      - name: npm audit (high+)
        working-directory: frontend
        run: npm audit --audit-level=high

  secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read          # gitleaks reads local git history
      security-events: write  # upload the gitleaks SARIF to code scanning (mirrors the image-scan-* / iac-scan / zizmor jobs)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false  # artipacked: gitleaks reads local history + uses GITHUB_TOKEN via env, never the stored git credential
      # gitleaks exits non-zero on a finding, which fails the job — that block
      # IS the gate (preserved byte-for-byte below). We now ALSO upload the gitleaks
      # SARIF to code scanning for the Security tab, which is why the job-level
      # security-events: write scope above was added. The upload does NOT weaken the
      # gate — findings still fail the job.
      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # gitleaks-action v3.0.0 runs `gitleaks detect --report-path=results.sarif`,
      # writing results.sarif to GITHUB_WORKSPACE on EVERY run (empty-results SARIF
      # when clean, populated on a finding). if: always() uploads on both clean and
      # finding runs (findings are exactly what we want surfaced); continue-on-error
      # guarantees an upload hiccup can never break the required secrets gate.
      - name: Upload gitleaks SARIF
        if: always()
        continue-on-error: true  # never let a SARIF-upload hiccup fail the required secrets gate
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: results.sarif
          category: gitleaks  # distinct from all trivy-* / zizmor categories

  dependency-review:
    # PR-only: the action diffs the dependency graph against the PR base — on a push it
    # has nothing to compare, so pull_request is the correct/expected trigger.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Least-privilege: contents: read ONLY. We deliberately do NOT enable the PR-comment
    # summary (that would require pull-requests: write) — skipping it preserves least
    # privilege, notably for fork PRs that don't receive write tokens.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # artipacked: dependency-review uses the API, not the stored git credential
      - name: Dependency review (fail on high+)
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Fail the PR when it introduces a high/critical vulnerable dependency.
          fail-on-severity: high
          # License policy — ALLOW-list (deny-licenses is deprecated for removal in the
          # next major; see actions/dependency-review-action#997). This fails a PR that adds
          # a dependency whose DETECTED license is not below; strong copyleft (GPL/AGPL) is
          # excluded by omission. Weak copyleft (LGPL, MPL-2.0) is intentionally allowed —
          # fine for a SaaS. Undetected/unknown licenses do NOT fail the action (it only
          # warns), so this stays low-noise. To exempt a specific package whose license is
          # misdetected, add it to `allow-dependencies-licenses` (PURL) rather than widening
          # this list. allow-licenses and deny-licenses are mutually exclusive.
          allow-licenses: >-
            MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, 0BSD, ISC, Zlib,
            Unlicense, CC0-1.0, CC-BY-4.0, Python-2.0, PSF-2.0, HPND,
            Artistic-2.0, BlueOak-1.0.0, MPL-2.0,
            LGPL-2.1-only, LGPL-2.1-or-later, LGPL-3.0-only, LGPL-3.0-or-later

  # image-scan is the PR-ONLY pre-merge CVE gate: it blocks a fixable HIGH/CRITICAL image
  # from reaching main. It is NOT release certification — publish-backend/-frontend now build
  # each image ONCE and Trivy-scan the EXACT bytes they ship (build-once/scan/promote), so
  # release CVE gating lives in publish. This job therefore runs ONLY on pull_request.
  # It is split per-image (backend / frontend) rather than a single matrix job so each image's
  # scan can be path-gated independently — GitHub Actions cannot skip individual matrix legs via
  # `if:` (a job-level `if:` gates the WHOLE matrix), so a frontend-only PR could not otherwise
  # skip the backend image scan. Each job carries the identical step body with its literal image
  # values inlined and a distinct SARIF category so results don't overwrite.
  image-scan-backend:
    needs: [changes]
    if: github.event_name == 'pull_request' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload Trivy image SARIF to code scanning (mirrors codeql.yml)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # artipacked: image build/scan needs no stored git credential
      - name: Set up Docker Buildx
        # build-push-action's load: true needs the buildx/docker driver.
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image (no push, load into local docker daemon)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          load: true  # load the single-arch image into local docker so Trivy can scan it by ref
          tags: nfl-pickem-backend:ci
      # Two-pass Trivy rationale: pass 1 ALWAYS uploads SARIF for the Security tab
      # (exit-code 0 — never fails); pass 2 is the exit-code gate. Separating reporting
      # from gating keeps the Security tab populated even on a passing run, and Trivy's
      # vuln DB is cached between the two passes so the second pass costs marginally.
      - name: Trivy image scan — SARIF report (always uploads, never gates)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: nfl-pickem-backend:ci
          format: sarif
          output: trivy-backend.sarif
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true  # SARIF matches the gated severities
          exit-code: '0'  # report-only pass — never fails the job
      - name: Upload Trivy image SARIF
        if: always()  # upload the report even when the gate below fails the job
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-image-backend  # distinct per image so results don't overwrite
      - name: Trivy image scan — gate (fixable HIGH/CRITICAL fails the job)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: nfl-pickem-backend:ci
          format: table
          ignore-unfixed: true  # unfixable base-image CVEs don't block a release
          severity: HIGH,CRITICAL
          exit-code: '1'  # the gate: fail ONLY on a fixable HIGH/CRITICAL

  image-scan-frontend:
    needs: [changes]
    if: github.event_name == 'pull_request' && (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.docker == 'true' || needs.changes.outputs.ci == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload Trivy image SARIF to code scanning (mirrors codeql.yml)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # artipacked: image build/scan needs no stored git credential
      - name: Set up Docker Buildx
        # build-push-action's load: true needs the buildx/docker driver.
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image (no push, load into local docker daemon)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true  # load the single-arch image into local docker so Trivy can scan it by ref
          tags: nfl-pickem-frontend:ci
      # Two-pass Trivy rationale: pass 1 ALWAYS uploads SARIF for the Security tab
      # (exit-code 0 — never fails); pass 2 is the exit-code gate. Separating reporting
      # from gating keeps the Security tab populated even on a passing run, and Trivy's
      # vuln DB is cached between the two passes so the second pass costs marginally.
      - name: Trivy image scan — SARIF report (always uploads, never gates)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: nfl-pickem-frontend:ci
          format: sarif
          output: trivy-frontend.sarif
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true  # SARIF matches the gated severities
          exit-code: '0'  # report-only pass — never fails the job
      - name: Upload Trivy image SARIF
        if: always()  # upload the report even when the gate below fails the job
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-frontend.sarif
          category: trivy-image-frontend  # distinct per image so results don't overwrite
      - name: Trivy image scan — gate (fixable HIGH/CRITICAL fails the job)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          image-ref: nfl-pickem-frontend:ci
          format: table
          ignore-unfixed: true  # unfixable base-image CVEs don't block a release
          severity: HIGH,CRITICAL
          exit-code: '1'  # the gate: fail ONLY on a fixable HIGH/CRITICAL

  iac-scan:
    # Advisory (report-only) IaC misconfig scan — deliberately NOT in publish.needs, so
    # findings land in the Security tab for triage without blocking merges/releases.
    # Single job (NOT a matrix): trivy config scans the whole tree once; a matrix would
    # rescan it. Runs on both pull_request and push (default on:).
    needs: [changes]
    if: needs.changes.outputs.docker == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload Trivy config SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # artipacked: trivy config scan needs no stored git credential
      - name: Trivy config (IaC) scan — advisory
        # config mode auto-discovers the Dockerfiles (backend/Dockerfile,
        # frontend/Dockerfile, frontend/Dockerfile.dev) and the compose files
        # (docker-compose.yml, .prod.yml, .deploy.yml) for IaC misconfiguration.
        # skip-dirs excludes .clusterfuzzlite/: its Dockerfile is the OSS-Fuzz
        # base-builder image (must run as root for compile_python_fuzzer) used
        # only as a throwaway CI fuzz-build env — never shipped/deployed — so
        # DS-0002 (root user) etc. there are false positives for our threat model.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: .
          skip-dirs: .clusterfuzzlite
          format: sarif
          output: trivy-config.sarif
          exit-code: '0'  # advisory — never gates
      - name: Upload Trivy config SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  zizmor:
    # GitHub Actions static-analysis gate (workflow security). Path-gated to the `ci` filter
    # (fires only when .github/workflows/** changes), so on a non-workflow PR it is SKIPPED —
    # which the ci-complete gate treats as pass. Wiring it into ci-complete.needs is what makes
    # this a real merge gate WITHOUT adding a new required status check / branch-protection change.
    #
    # Gate posture = BLOCKING, achieved via TWO steps because zizmor-action cannot both upload
    # SARIF and fail on findings in a single invocation (mirrors this file's two-pass Trivy
    # "report + gate" convention):
    #   1. advanced-security: true  -> uploads SARIF to the Security tab, but BY DESIGN never
    #      fails on findings (GitHub Advanced Security expects blocking via code-scanning merge
    #      protection, which is a branch-protection ruleset this task must not touch).
    #   2. advanced-security: false -> no SARIF upload, but FAILS the job on any finding — the gate.
    # The audited workflow set (ci.yml, codeql.yml, scorecard.yml) is currently zizmor-clean; the
    # only accepted findings are the rationale-suppressed `# zizmor: ignore[cache-poisoning]`
    # inlines, so the blocking step is green today and will fail on any NEW workflow-security finding.
    needs: [changes]
    if: needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload zizmor SARIF to code scanning (advanced-security step)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # artipacked: zizmor only reads the checked-out workflow files
      - name: zizmor — upload SARIF to code scanning (report; never fails)
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          inputs: .github/workflows/
          advanced-security: true  # public repo — uploads to the Security tab; does not fail on findings
      - name: zizmor — blocking gate (fails on any finding)
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          inputs: .github/workflows/
          advanced-security: false  # no SARIF upload here; exits non-zero on findings — this IS the gate

  semgrep:
    # Semgrep SAST — additive over CodeQL (framework-aware registry packs + hand-authored
    # FastAPI/SQLModel invariants in .semgrep/custom/). TWO passes, mirroring this file's
    # Trivy / zizmor "report + gate" convention:
    #   REPORT (never gates): registry packs (p/python + p/react + p/typescript) PLUS the
    #     custom rules → SARIF to the Security tab under category: semgrep. `|| true` keeps
    #     it non-blocking, so a registry false-positive OR a semgrep.dev outage can never
    #     wedge a merge. Live registry fetch is acceptable here (non-blocking path).
    #   GATE (blocks): custom .semgrep/ rules ONLY, offline/deterministic (no registry
    #     config), `--severity ERROR --error`. Pinning the Semgrep binary pins the ENGINE,
    #     NOT the registry rules (those are fetched live) — so keeping the blocking path
    #     custom-YAML-only + offline is what makes the gate reproducible. No custom rule
    #     ships at ERROR yet (all are WARNING canaries), so this passes cleanly today but is
    #     ARMED for future promotions.
    # Path-gated + wired into ci-complete.needs is what makes this a real merge gate WITHOUT
    # adding a new branch-protection required status check (mirrors the zizmor pattern).
    #
    # PIN MECHANISM: the official Semgrep container by @sha256 digest (matches the repo's
    # digest-pinned base images), run via `docker run` so the SARIF-upload ACTION still runs
    # on the node-capable runner. NOT the semgrep-action (that targets the Semgrep AppSec
    # platform / login token). The image runs as root, so semgrep.sarif written into the
    # mounted /src is root-owned but world-readable — upload-sarif (runner user) reads it
    # fine; if a future image drops root, add `-u "$(id -u):$(id -g)" -e HOME=/tmp` to the
    # `docker run`. FALLBACK if the container path has friction: run the identical two passes
    # via `uvx --python 3.12 semgrep==1.145.0 scan ...` on the runner (version pin == engine pin).
    needs: [changes]
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.ci == 'true' || needs.changes.outputs.semgrep == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload the semgrep SARIF to code scanning (mirrors zizmor / trivy / gitleaks)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # artipacked: semgrep only reads the checked-out tree
      # REPORT pass — registry packs + custom rules → SARIF. `|| true` neutralises a
      # findings exit AND a registry-fetch/exit-2 hiccup, so this pass never fails the job.
      - name: Semgrep — SARIF report (registry packs + custom; always non-gating)
        run: |
          docker run --rm -v "$PWD":/src -w /src \
            semgrep/semgrep@sha256:b68f9b68483955b85042dac7b4533757779625a02dcf91e470da4c2df1b430be \
            semgrep scan \
              --config p/python --config p/react --config p/typescript \
              --config .semgrep/custom/ \
              --metrics=off --sarif --sarif-output=semgrep.sarif || true
      - name: Upload Semgrep SARIF
        if: always()  # upload the report even if a later step fails the job
        continue-on-error: true  # never let a SARIF-upload hiccup fail the semgrep gate (mirrors gitleaks)
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: semgrep.sarif
          category: semgrep  # distinct from all trivy-* / zizmor / gitleaks categories
      # GATE pass — custom rules ONLY, offline (no registry config), ERROR-severity.
      # `--error` makes a matching ERROR finding exit non-zero; NO `|| true` — this is the gate.
      # Green today (no custom rule ships at ERROR yet); armed for future promotions.
      - name: Semgrep — offline gate (custom ERROR rules only; blocks)
        run: |
          docker run --rm -v "$PWD":/src -w /src \
            semgrep/semgrep@sha256:b68f9b68483955b85042dac7b4533757779625a02dcf91e470da4c2df1b430be \
            semgrep scan \
              --config .semgrep/custom/ \
              --severity ERROR --metrics=off --error

  # publish is split per-image (mirroring the image-scan-backend/-frontend split) so a
  # path-filtered push that changes only ONE image still publishes THAT image. On a v* tag
  # the changes job forces both images' filters true, so every release publishes both images.
  #
  # BUILD-ONCE / SCAN / PROMOTE (spike 001): each image is built EXACTLY once into a local OCI
  # layout DIRECTORY (provenance=mode=max + sbom, NO registry push), then a two-pass Trivy scan
  # gates those EXACT bytes — a fixable HIGH/CRITICAL fails the job BEFORE anything is pushed.
  # That scan IS the release CVE gate; it replaces the former external image-scan dependency
  # (now PR-only). crane then promotes the byte-identical index to GHCR and aliases every
  # metadata-action tag onto that one digest, so the scanned digest == the shipped digest, with
  # the SBOM + SLSA-provenance attestation manifests intact. cosign keyless-OIDC signs the pushed
  # index digest. publish is push-only (main / v* tags) and gates on lint/test/secrets (backend)
  # or frontend/secrets (frontend). iac-scan (advisory) and dependency-review (PR-only) are NOT
  # gates here.
  publish-backend:
    needs: [lint, test, secrets]
    # Never on pull_request: only push to main or a v* tag, and only if no backend quality gate
    # actually failed. always() is required so a path-skipped sibling job cannot cascade-skip this
    # one. This job now self-scans the exact artifact it ships (the two-pass Trivy gate below), so
    # it no longer depends on the external image-scan job.
    if: >-
      ${{ always()
      && github.event_name == 'push'
      && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
      && needs.lint.result != 'failure' && needs.lint.result != 'cancelled'
      && needs.test.result != 'failure' && needs.test.result != 'cancelled'
      && needs.secrets.result != 'failure' && needs.secrets.result != 'cancelled' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write  # cosign keyless OIDC signing (mint a short-lived Fulcio cert); does not widen any other scope
      security-events: write  # this job now runs the two-pass Trivy image scan and uploads its SARIF (mirrors the former image-scan job)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # artipacked: images are pushed via docker login + cosign signs by digest — no stored git credential used
      - name: Log in to GHCR
        # Also authenticates crane below (writes ~/.docker/config.json) — no extra auth step.
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/zachmce/nfl-pickem-backend
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Set up Docker Buildx
        # buildx's docker-container driver is REQUIRED for build-push-action to emit SBOM +
        # provenance attestation manifests; the default `docker` driver silently cannot.
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Set up crane
        # crane promotes the byte-identical local OCI layout to GHCR and aliases each metadata tag
        # onto the one pushed index digest (spike 001). GHCR auth is inherited from docker/login-action.
        uses: imjasonh/setup-crane@feee3b6bb0d4c68370f256a4502498c9227e5c6b # v0.7
      - name: Build image (OCI layout, no push)
        # Build ONCE into a local OCI layout DIRECTORY (tar=false) that Trivy scans and crane
        # promotes byte-identically — no registry push here. mode=max + sbom emit the
        # attestation-bearing OCI index into the directory; `tags:` is only the layout's local ref.
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./backend
          file: ./backend/Dockerfile
          outputs: type=oci,dest=./oci-backend,tar=false
          tags: nfl-pickem-backend:build
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
      # Two-pass Trivy rationale: pass 1 ALWAYS uploads SARIF for the Security tab (exit-code 0 —
      # never fails); pass 2 is the exit-code gate. BOTH scan the EXACT OCI layout dir that crane
      # promotes below (trivy image --input <dir>, the spike-001 proven form — NOT an exported OCI
      # tar). So the scanned bytes are the shipped bytes. This is the release CVE gate and it runs
      # BEFORE the promote step, so a fixable HIGH/CRITICAL blocks the push.
      - name: Trivy image scan — SARIF report (always uploads, never gates)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          input: ./oci-backend  # scan the OCI layout DIRECTORY (wrapper passes trivy image --input <dir>)
          format: sarif
          output: trivy-backend.sarif
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          limit-severities-for-sarif: true  # SARIF matches the gated severities
          exit-code: '0'  # report-only pass — never fails the job
      - name: Upload Trivy image SARIF
        if: always()  # upload the report even when the gate below fails the job
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-image-backend  # same category as the PR-only image-scan job — no conflict (that runs on PR, this on push)
      - name: Trivy image scan — gate (fixable HIGH/CRITICAL fails the job, before push)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: image
          input: ./oci-backend
          format: table
          ignore-unfixed: true  # unfixable base-image CVEs don't block a release
          severity: HIGH,CRITICAL
          exit-code: '1'  # the gate: fail ONLY on a fixable HIGH/CRITICAL — runs BEFORE the promote below
      # FALLBACK (only if trivy-action's `input:` ever rejects the directory): install the trivy CLI
      # and run `trivy image --input ./oci-backend --severity HIGH,CRITICAL --ignore-unfixed ...`
      # directly, preserving the identical two-pass report+gate posture (spike 001 proven form).
      - name: Promote byte-identical index + alias tags
        id: push
        # crane writes the scanned OCI layout to GHCR under the FIRST metadata tag, preserving the
        # index digest + SBOM/provenance attestation manifests; crane tag then aliases every
        # remaining metadata tag (by its tag suffix) onto that same digest. The pushed index digest
        # is captured for cosign. template-injection posture: metadata tags arrive via env TAGS,
        # referenced as a shell var — no ${{ }} spliced into the run body (matches the cosign step).
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          first_ref=""
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            if [ -z "$first_ref" ]; then
              first_ref="$ref"
              crane push ./oci-backend "$first_ref"
            else
              crane tag "$first_ref" "${ref##*:}"
            fi
          done <<< "$TAGS"
          digest="$(crane digest "$first_ref")"
          echo "digest=$digest" >> "$GITHUB_OUTPUT"
      - name: Install cosign
        # SHA resolved + verified against the GitHub API (repos/sigstore/cosign-installer/releases/latest).
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Sign image (cosign keyless)
        # Keyless signing via GitHub OIDC: Fulcio issues a short-lived cert bound to this
        # workflow's identity and the signature is logged to the Rekor transparency log — no
        # key management. Requires the job's id-token:write. cosign v2 is keyless by default
        # (no COSIGN_EXPERIMENTAL). Sign by DIGEST — the crane-promoted OCI image index
        # (provenance mode=max) — so the signature covers the whole index; signing writes a
        # separate .sig tag and does NOT mutate the scanned/pushed digest.
        # template-injection fix: pass the ${{ }} values through env vars and reference them as
        # shell variables so no expansion is spliced into the run script (zizmor best practice).
        env:
          IMAGE_NAME: ghcr.io/zachmce/nfl-pickem-backend
          IMAGE_DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${IMAGE_NAME}@${IMAGE_DIGEST}"

