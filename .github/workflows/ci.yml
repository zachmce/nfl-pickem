  ci-complete:
    # Single aggregation gate — the ONE status check branch protection should require
    # for CI (see the branch-protection handoff in the PR/SUMMARY). Path-filtered PRs
    # leave some needed jobs `skipped`, which branch protection treats as pass; a job
    # that actually FAILED or was CANCELLED must still block the merge. `if: always()`
    # ensures this job runs even when a needed job is skipped/failed, and it inspects
    # every needed job's result, failing on any `failure`/`cancelled` while treating
    # `skipped`/`success` as pass. publish is intentionally EXCLUDED — it is push-only
    # (main/tags) and not a PR merge gate. gitleaks (secrets) is included so a secret
    # finding still blocks the gate.
    needs:
      - changes
      - lint
      - typecheck
      - deps-audit
      - test
      - frontend
      - secrets
      - dependency-review
      - image-scan-backend
      - image-scan-frontend
      - iac-scan
      - zizmor
      - semgrep
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Verify no needed job failed or was cancelled
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "Needed job results: $RESULTS"
          for r in $RESULTS; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required CI job reported '$r' — failing the ci-complete gate."
              exit 1
            fi
          done
          echo "All needed jobs passed or were skipped — ci-complete is green."
