name: CodeQL

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly — Mondays at 05:23 UTC.
    - cron: '23 5 * * 1'

# Least-privilege default: read-only at the top level. The write token
# (security-events:write, to upload SARIF) is scoped to the analyze job below so
# no workflow-wide write permission is granted (OSSF Scorecard Token-Permissions).
permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read           # read workflow run metadata during analysis
      contents: read          # checkout
      security-events: write  # upload CodeQL SARIF to code scanning
    strategy:
      fail-fast: false
      matrix:
        language: [python, javascript-typescript]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # artipacked: CodeQL analyzes the checked-out tree; no downstream git ops need the stored token
      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          languages: ${{ matrix.language }}
      # No autobuild step: python + javascript-typescript are interpreted and
      # CodeQL extracts them without a build.
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          category: "/language:${{ matrix.language }}"
