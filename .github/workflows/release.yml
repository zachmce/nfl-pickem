name: Release

# Cuts a signed GitHub Release on a v* tag: derives the published GHCR image
# digests, writes checksums.txt, and attaches cosign keyless signatures plus a
# cosign in-toto SLSA-provenance attestation (checksums.intoto.jsonl). The
# .intoto.jsonl asset is what scores OSSF Scorecard Signed-Releases 10; the
# .sig/.sigstore.json give consumers a verifiable detached signature. Standalone
# and tag-only (never a PR gate / not in ci-complete), mirroring scorecard.yml.
on:
  push:
    tags: ['v*']

# Least-privilege default; the release job widens to job-scoped writes.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # never cancel a half-created release

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub Release + upload assets
      id-token: write  # cosign keyless (Fulcio/Rekor) — same trust model as ci.yml publish
      packages: read   # imagetools inspect the pushed GHCR images
      security-events: write  # upload the report-only released-digest Trivy SARIF to code scanning; mirrors the image-scan-* / iac-scan / zizmor scan jobs in ci.yml
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false  # artipacked: release assets go via GITHUB_TOKEN API + cosign; no stored git credential used

      - name: Log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive published image digests → checksums.txt
        id: digests
        # release.yml and ci.yml's publish job both fire on the v* tag; publish
        # pushes the images, so retry imagetools inspect until they appear and fail
        # cleanly if they never do (a blocked/failed publish → no release).
        env:
          VERSION: ${{ github.ref_name }}
          BACKEND: ghcr.io/zachmce/nfl-pickem-backend
          FRONTEND: ghcr.io/zachmce/nfl-pickem-frontend
        run: |
          set -euo pipefail
          # publish tags images via metadata-action {{version}}, which strips the
          # leading v (pushes :1.0.0, never :v1.0.0) — look the image up by that value.
          IMAGE_TAG="${VERSION#v}"
          digest_of() {
            local ref="$1" i out
            for i in $(seq 1 20); do
              if out=$(docker buildx imagetools inspect "$ref" --format '{{.Manifest.Digest}}' 2>/dev/null); then
                printf '%s' "$out"; return 0
              fi
              echo "waiting for $ref (attempt $i/20)…" >&2
              sleep 30
            done
            echo "ERROR: $ref not found after retries — did the publish job succeed?" >&2
            return 1
          }
          backend_digest=$(digest_of "${BACKEND}:${IMAGE_TAG}")
          frontend_digest=$(digest_of "${FRONTEND}:${IMAGE_TAG}")
          {
            echo "# nfl-pickem ${VERSION} — published container image digests"
            echo "${BACKEND}@${backend_digest}"
            echo "${FRONTEND}@${frontend_digest}"
          } > checksums.txt
          echo "--- checksums.txt ---"
          cat checksums.txt
          # Thread the SAME digests to step outputs so the fail-closed cosign-verify gate and
          # the SBOM-extract step target EXACTLY what was checksummed — no divergent re-inspect.
          echo "backend_digest=${backend_digest}" >> "$GITHUB_OUTPUT"
          echo "frontend_digest=${frontend_digest}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin cosign v2: v3.0.0 made --new-bundle-format the default, which makes
          # sign-blob/attest-blob IGNORE --output-signature and --output-attestation
          # ("deprecated when using --new-bundle-format and will be ignored"). That
          # silently drops checksums.txt.sig AND checksums.intoto.jsonl, so the
          # release upload fails ("no matches found") and — critically — the
          # .intoto.jsonl asset that scores Scorecard Signed-Releases 10 is never
          # emitted. v2.6.x keeps the classic detached-file outputs this workflow
          # (and Scorecard's asset-suffix detection) depend on. Revisit if migrating
          # the assets to the sigstore bundle format. (image signing in ci.yml uses
          # `cosign sign`, unaffected by this, and stays on the default v3.)
          cosign-release: 'v2.6.3'

      - name: Verify published image signatures (cosign keyless) — fail-closed gate
        # Fail-closed supply-chain gate: cosign-verify EACH published index digest against our
        # OWN ci.yml publish keyless identity. ci.yml's publish-backend/-frontend sign the pushed
        # index digest via GitHub OIDC, so Fulcio mints a cert whose SAN is the ci.yml workflow
        # ref (…/.github/workflows/ci.yml@refs/tags/vX); the identity regexp anchors on that path
        # and leaves @<ref> open. If NO matching signature ever appears, the loop below exhausts
        # its retries and returns non-zero, which `set -e` turns into a job failure BEFORE the
        # checksums are signed / attested and the Release is created — so a stray/out-of-band
        # digest our publish job never signed halts the release.
        #
        # RETRY (race): release.yml and ci.yml both fire on the v* tag and run CONCURRENTLY. The
        # `Derive digests` step above waits for the image MANIFEST (crane push), but publish's
        # `cosign sign` runs a few steps LATER — so the signature can lag the manifest by ~30-120s.
        # Without a retry, verify races ahead of signing and false-fails "no signatures found"
        # (observed on the v1.1.1 and v1.1.2 tag cuts). Retry until the signature verifies, then
        # fail closed. cosign v2.6.3 (installed above) verifies these images fine — no v3 needed.
        # template-injection posture (zizmor): every ${{ }} value flows through env and is
        # referenced ONLY as a shell var — nothing is spliced into the run body.
        env:
          BACKEND: ghcr.io/zachmce/nfl-pickem-backend
          FRONTEND: ghcr.io/zachmce/nfl-pickem-frontend
          BACKEND_DIGEST: ${{ steps.digests.outputs.backend_digest }}
          FRONTEND_DIGEST: ${{ steps.digests.outputs.frontend_digest }}
          CERT_OIDC_ISSUER: https://token.actions.githubusercontent.com
          CERT_IDENTITY_REGEXP: '^https://github\.com/zachmce/nfl-pickem/\.github/workflows/ci\.yml@'
        run: |
          set -euo pipefail
          # Up to 20 attempts × 15s ≈ 5 min — ample for publish's sign step to land after the
          # manifest, while still failing closed on a genuinely unsigned / wrong-identity digest.
          verify_signed() {
            local ref="$1" i
            for i in $(seq 1 20); do
              if cosign verify \
                   --certificate-oidc-issuer "$CERT_OIDC_ISSUER" \
                   --certificate-identity-regexp "$CERT_IDENTITY_REGEXP" \
                   "$ref" > /dev/null 2>&1; then
                echo "  ✓ verified ${ref} (attempt ${i})"
                return 0
              fi
              echo "  waiting for a valid signature on ${ref} (attempt ${i}/20)…" >&2
              sleep 15
            done
            echo "ERROR: ${ref} has no signature from our publish identity after retries — failing closed." >&2
            return 1
          }
          verify_signed "${BACKEND}@${BACKEND_DIGEST}"
          verify_signed "${FRONTEND}@${FRONTEND_DIGEST}"
          echo "✓ both published digests verified against the ci.yml publish identity"

      - name: Sign checksums (cosign keyless sign-blob)
        # Keyless via GitHub OIDC (Fulcio cert + Rekor entry) — no keys, same trust
        # model as the image signing in ci.yml. Produces the signature assets
        # (.sig + .sigstore.json bundle) Scorecard counts + a consumer can verify.
        run: |
          set -euo pipefail
          cosign sign-blob --yes checksums.txt \
            --bundle checksums.txt.sigstore.json \
            --output-signature checksums.txt.sig

      - name: Attest checksums provenance (cosign keyless attest-blob)
        # Emits a signed in-toto SLSA-provenance statement named *.intoto.jsonl —
        # the asset that scores Scorecard Signed-Releases 10. Context values are
        # passed via env and referenced as shell vars (zizmor template-injection).
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          cat > predicate.json <<EOF
          {
            "buildType": "https://github.com/${REPO}/release",
            "builder": { "id": "https://github.com/${REPO}/.github/workflows/release.yml@refs/tags/${VERSION}" },
            "invocation": {
              "configSource": {
                "uri": "git+https://github.com/${REPO}@refs/tags/${VERSION}",
                "digest": { "sha1": "${COMMIT_SHA}" }
              }
            },
            "metadata": { "buildInvocationId": "${RUN_URL}" }
          }
          EOF
          cosign attest-blob --yes checksums.txt \
            --predicate predicate.json \
            --type slsaprovenance \
            --output-attestation checksums.intoto.jsonl

      - name: Extract SBOM from published images → release assets
        # Surface the SPDX SBOM the publish build already emits (mode=max + sbom) but never
        # shipped: pull it out of each pushed OCI index and attach it to the Release. buildx is
        # already used by the derive step (no setup). Reuses the Task-1 digests (same env-var
        # indirection). Guards LOUDLY on a valid spdxVersion so an empty/garbage SBOM is never
        # attached — the release fails instead of misleading consumers with a bogus inventory.
        env:
          BACKEND: ghcr.io/zachmce/nfl-pickem-backend
          FRONTEND: ghcr.io/zachmce/nfl-pickem-frontend
          BACKEND_DIGEST: ${{ steps.digests.outputs.backend_digest }}
          FRONTEND_DIGEST: ${{ steps.digests.outputs.frontend_digest }}
        run: |
          set -euo pipefail
          extract_sbom() {
            local ref="$1" out="$2" raw doc
            echo "extracting SBOM from ${ref} …"
            raw="$(docker buildx imagetools inspect "$ref" --format '{{ json .SBOM }}')"
            # `.SBOM` wraps the SPDX doc: single-arch → top-level `.SPDX`; otherwise the first
            # platform entry's `.SPDX`. select() on spdxVersion makes a missing/garbage doc yield
            # empty, so `jq -e` exits non-zero → the release FAILS rather than attaching an empty file.
            if ! doc="$(printf '%s' "$raw" | jq -e '(.SPDX // (to_entries | .[0].value.SPDX) // empty) | select(.spdxVersion != null)')"; then
              echo "ERROR: no valid SPDX SBOM (with spdxVersion) found for ${ref} — refusing to attach an empty file" >&2
              exit 1
            fi
            printf '%s\n' "$doc" > "$out"
            echo "wrote ${out} ($(wc -c < "$out") bytes, spdxVersion=$(printf '%s' "$doc" | jq -r .spdxVersion))"
          }
          extract_sbom "${BACKEND}@${BACKEND_DIGEST}" sbom-backend.spdx.json
          extract_sbom "${FRONTEND}@${FRONTEND_DIGEST}" sbom-frontend.spdx.json

      - name: Create GitHub Release with signed assets
        # Uses the preinstalled gh CLI (no third-party release action to pin), and
        # is idempotent so re-running the tag re-uploads rather than failing.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          assets=(checksums.txt checksums.txt.sig checksums.txt.sigstore.json checksums.intoto.jsonl sbom-backend.spdx.json sbom-frontend.spdx.json)
          if gh release view "${VERSION}" >/dev/null 2>&1; then
            gh release upload "${VERSION}" "${assets[@]}" --clobber
          else
            gh release create "${VERSION}" --title "${VERSION}" --generate-notes "${assets[@]}"
          fi

      # ── Report-only released-digest Trivy scan ──────────────────────────────
      # A full-CVE-profile record of exactly what shipped: scan each PUBLISHED image
      # BY DIGEST and upload a deliberately BROADER SARIF (all severities INCLUDING
      # unfixed) than the ci.yml publish gate (which narrows to fixable HIGH,CRITICAL).
      # These steps run AFTER "Create GitHub Release" and use exit-code 0 +
      # continue-on-error, so a scan/upload hiccup can NEVER block or unwind the
      # release. The blocking CVE gate already lives in ci.yml's build-once/scan/
      # promote publish path — this is the broader release-time record, not a gate.
      # Digests flow via step-level env into the action `with:` input (no shell run
      # body), matching the file's env-indirection posture (zizmor template-injection).
      - name: Trivy scan released backend digest — SARIF report (never gates)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        continue-on-error: true  # a trivy hiccup must not redden the job after the release exists
        env:
          BACKEND_DIGEST: ${{ steps.digests.outputs.backend_digest }}
        with:
          scan-type: image
          image-ref: ghcr.io/zachmce/nfl-pickem-backend@${{ env.BACKEND_DIGEST }}
          format: sarif
          output: trivy-released-backend.sarif
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL  # full CVE profile — broader than the publish gate
          exit-code: '0'  # report-only — this scan NEVER gates the release
      - name: Upload released backend Trivy SARIF
        if: always()  # upload even if the scan above hit continue-on-error
        continue-on-error: true  # a code-scanning upload hiccup must never redden the post-release job
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-released-backend.sarif
          category: trivy-released-backend  # distinct from publish's trivy-image-backend / iac's trivy-config
      - name: Trivy scan released frontend digest — SARIF report (never gates)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        continue-on-error: true  # a trivy hiccup must not redden the job after the release exists
        env:
          FRONTEND_DIGEST: ${{ steps.digests.outputs.frontend_digest }}
        with:
          scan-type: image
          image-ref: ghcr.io/zachmce/nfl-pickem-frontend@${{ env.FRONTEND_DIGEST }}
          format: sarif
          output: trivy-released-frontend.sarif
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL  # full CVE profile — broader than the publish gate
          exit-code: '0'  # report-only — this scan NEVER gates the release
      - name: Upload released frontend Trivy SARIF
        if: always()  # upload even if the scan above hit continue-on-error
        continue-on-error: true  # a code-scanning upload hiccup must never redden the post-release job
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: trivy-released-frontend.sarif
          category: trivy-released-frontend  # distinct from publish's trivy-image-frontend / iac's trivy-config
