# Development stack. The frontend runs the Vite dev server with HMR.
# For a production-style build that serves the compiled SPA via nginx, use:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pickem}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pickem}
      POSTGRES_DB: ${POSTGRES_DB:-pickem}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pickem}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Init container: runs Alembic migrations to head, then exits. Both the
  # backend and worker wait for it to complete successfully before starting.
  migrate:
    build:
      context: ./backend
    # Schema migration THEN baseline reference-data seed, in one single-process
    # step. sh -c lets us chain && in the array (exec) form. Running the seed
    # here (not in the app lifespan) keeps DB-prep in one place, guarantees it
    # runs after the schema exists, and avoids concurrent seeders racing on
    # multi-worker app boot. All other services depend on this completing
    # successfully, so they wait for both migrate and seed.
    # Then the env-gated demo seed: app.seeds.demo.main() itself gates on
    # settings.is_demo_data and NO-OPS (prints a refusal) when the flag is OFF, so
    # the prod path is unchanged — the command runs but the seed refuses. When ON,
    # it seeds the time-shifted 2025 demo season (teams idempotently, so leaving
    # app.seeds.teams in the base path keeps prod seeding intact and is safe here).
    command: ["sh", "-c", "alembic upgrade head && python -m app.seeds.teams && python -m app.seeds.demo"]
    env_file: .env
    # Mounted so autogenerated migrations land on the host, not just inside
    # the throwaway container (`docker compose run --rm migrate ...`).
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: ./backend
    command:
      ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    env_file: .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: ./backend
    # Embedded beat (`--beat`) on the single-worker dev stack — simplest way to
    # actually run the beat_schedule so the refresh_games poller fires on its
    # cadence and the (shifted demo) season unspools on its own. For a multi-worker
    # prod deploy, split this into a dedicated `celery beat` service so only one
    # scheduler runs.
    #
    # `watchmedo auto-restart` restores edit-time reloads (Celery dropped its own
    # --autoreload in v4): it watches the bind-mounted app package and restarts the
    # worker on *.py changes. Watching /app/app (not /app) deliberately skips the
    # mounted .venv. The prod overlay overrides this back to a plain celery command.
    #
    # --schedule points beat's persistent schedule DB at the named volume (below),
    # NOT its cwd (/app = the bind-mounted ./backend). Otherwise beat writes
    # celerybeat-schedule{,-shm,-wal} into the repo, owned root:root (the container
    # runs as root). The named volume keeps that state off the host tree and
    # persists it across restarts so beat doesn't re-fire everything on restart.
    command:
      ["watchmedo", "auto-restart", "--directory=/app/app", "--pattern=*.py", "--recursive", "--signal=SIGTERM", "--",
       "celery", "-A", "app.celery_app.celery_app", "worker", "--beat", "--loglevel=info", "--schedule=/var/lib/celerybeat/celerybeat-schedule"]
    env_file: .env
    volumes:
      - ./backend:/app
      - celerybeat:/var/lib/celerybeat
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Discord bot. Shares the backend image; the entrypoint runs the gateway client
  # instead of uvicorn. Comes up with the rest of the stack.
  # NOTE: the bot fails fast (exits) if DISCORD_BOT_TOKEN / DISCORD_GUILD_ID are
  # unset — with restart: unless-stopped that is a crash-loop, so keep those set
  # in .env. If you want to run the stack without the bot, comment this service
  # out or stop it with `docker compose stop bot`.
  bot:
    build:
      context: ./backend
    command: ["python", "-m", "app.bot.client"]
    env_file: .env
    volumes:
      - ./backend:/app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # Heartbeat file mtime: the client touches /tmp/bot_heartbeat every 15s
      # while the gateway is live. Stale (>60s) or missing → unhealthy.
      test: ["CMD", "python3", "-c", "import os, time, sys; s=os.stat('/tmp/bot_heartbeat'); sys.exit(0 if time.time()-s.st_mtime < 60 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      VITE_API_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      # The good stuff:
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_CONFIG_LOGIN_BANNER: '"Local dev — no auth"'
      PGADMIN_DISABLE_POSTFIX: "True"
      GUNICORN_ACCESS_LOGFILE: /dev/null
    ports:
      - "5050:80"
    volumes:
      - pgadmindata:/var/lib/pgadmin
      # - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/misc/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  redisdata:
  pgadmindata:
  celerybeat:
