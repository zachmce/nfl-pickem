# Production-style override: replaces the Vite dev server with an nginx
# container serving the compiled SPA, and drops backend hot-reload + mounts.
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build

services:
  backend:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    volumes: []

  worker:
    # Plain celery — no watchmedo auto-restart (that's a dev-only convenience).
    # No named volume here (volumes cleared), so beat writes its schedule into the
    # image's /var/lib/celerybeat (created in the Dockerfile) — container-internal,
    # never the host.
    command:
      ["celery", "-A", "app.celery_app.celery_app", "worker", "--beat", "--loglevel=info", "--schedule=/var/lib/celerybeat/celerybeat-schedule"]
    volumes: []

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Rootless nginx serves on container port 8080; publish it on host :80.
    ports:
      - "80:8080"
