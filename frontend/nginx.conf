server {
    # Rootless nginx (Chainguard nginx, uid 65532) cannot bind ports <1024, so the
    # SPA is served on 8080 inside the container; compose maps host :80 -> :8080.
    listen 8080;
    server_name _;

    # HSTS is intentionally omitted: nginx terminates plain HTTP behind the
    # compose network (no TLS here yet). Add Strict-Transport-Security only once
    # a TLS-terminating edge exists (threat T-t7-04, accepted for now).
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Baseline security response headers (server-level defaults). `always` emits
    # them on error responses too. NOTE: a nested `add_header` in any `location`
    # SUPPRESSES these inherited headers, so blocks that carry their own
    # add_header (= /index.html and /assets/) must REPEAT them below.
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https://cdn.discordapp.com https://a.espncdn.com data:; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'; base-uri 'self'" always;

    # SPA fallback: every unknown path serves index.html so client-side
    # routing works on hard refresh. No add_header here, so it INHERITS the
    # server-level security headers above.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Serve index.html with no-cache so a redeploy's purged content-hashed assets
    # never strand a client holding a stale index (threat T-t7-03). This
    # exact-match block is where the root `/` and every SPA deep-link land via the
    # `index` directive / try_files internal redirect. Its own add_header
    # suppresses inheritance, so the three security headers are REPEATED here.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' https://cdn.discordapp.com https://a.espncdn.com data:; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'; base-uri 'self'" always;
    }

    # Proxy API calls to the FastAPI backend service. Only proxy_set_header
    # directives (no add_header), so it INHERITS the server-level headers.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets aggressively (they are content-hashed by Vite). This
    # block's own add_header suppresses inheritance, so the three security
    # headers are REPEATED here alongside the immutable caching.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' https://cdn.discordapp.com https://a.espncdn.com data:; style-src 'self' 'unsafe-inline'; frame-ancestors 'none'; base-uri 'self'" always;
    }
}
