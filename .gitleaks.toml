# gitleaks config — EXTENDS the default ruleset (never replaces it) and adds a
# narrow allowlist for known-benign false positives that the default ruleset
# flags in tracked content. The CI gitleaks-action picks this file up from the
# repo root automatically.
#
# Empirical basis: `gitleaks git .` (the action's git-history scan mode) against
# the default ruleset reported 4 findings, all benign:
#   - README.md                              discord-client-id  -> documentation prose
#   - backend/tests/test_login_schema_bounds.py  generic-api-key -> a docstring line
#   - backend/tests/test_discord_avatar.py (x2)  discord-client-secret -> a fake
#     32-hex avatar-hash test fixture (a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4)
# None are real credentials. Each is allowlisted as narrowly as possible.

[extend]
useDefault = true

[allowlist]
description = "Known-benign false positives in docs and test fixtures."
# Allowlist ONLY the specific files/values below — nothing broader.
paths = [
  # Docstring prose in a schema-bounds test trips the generic-api-key rule.
  '''backend/tests/test_login_schema_bounds\.py''',
  # Fake 32-hex avatar-hash fixture trips the discord-client-secret rule.
  '''backend/tests/test_discord_avatar\.py''',
  # Documentation prose in the README trips the discord-client-id rule.
  '''README\.md''',
]
regexes = [
  # The exact fake avatar-hash literal used as a test fixture.
  '''a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4''',
]
